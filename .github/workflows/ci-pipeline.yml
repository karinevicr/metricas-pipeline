name: CI Pipeline Experimental

on:
  push:
    branches: [ main, experimento-* ]
  workflow_dispatch:

jobs:
  lint:
    needs: tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: requirements.txt
    
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8
    
    - name: Lint com flake8
      run: |
        flake8 src/ --count --max-complexity=10 --statistics

  tests:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: requirements.txt

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8
    
    - name: Executar testes
      run: |
        python -m pytest tests/ -v --tb=short --junitxml=test-results.xml
    
    - name: Gerar artefato com resultados
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          test-results.xml
          .pytest_cache/